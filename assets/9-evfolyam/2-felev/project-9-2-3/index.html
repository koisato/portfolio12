<!DOCTYPE html>
<html lang="hu">
<head>

  <meta name="viewport" content="width=960, initial-scale=1.0">
  <title>IKT Projekt – Összefoglaló prezentáció</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #08111c; }
    body { width: 100vw; height: 100vh; min-height: 100vh; min-width: 100vw; margin: 0; padding: 0; overflow: hidden; }
    .iframe-wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 0;
      overflow: hidden;

    iframe {
      width: 100vw;
      height: 100vh;
      min-width: 100vw;
      min-height: 100vh;
      border: none;
      display: block;
      background: #111;
    }
  </style>
</head>

  <div class="iframe-wrap">
    <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vRefz4QBGgYrBOC581oD_F5gfIDbsXsaU4npbmesR3YJDd4ntg8CnhuKKdE2pVR3g/pubembed?start=true&loop=false&delayms=300000" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
