<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Uj szerzo felvetele</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="data.inline.js"></script>
  <script src="static-app.js" defer></script>
</head>
<body data-page="add-author">
  <div id="navbar-root"></div>
  <div class="container-fluid p-5 bg-primary text-white text-center">
    <h1>Szerzo felvetele</h1>
    <p>Itt lehet szerzot felvenni.</p>
  </div>

  <div class="container mt-5" id="app-error">
    <h2>Uj szerzo felvetele</h2>
    <div id="messages"></div>
    <form id="authorForm" novalidate>
      <div class="mb-3">
        <label for="szerzo_nev" class="form-label">Nev</label>
        <input type="text" class="form-control" id="szerzo_nev">
      </div>
      <div class="mb-3">
        <label for="szerzo_szul_ido" class="form-label">Szuletesi ev</label>
        <input type="number" class="form-control" id="szerzo_szul_ido" min="1000" max="3000">
      </div>
      <div class="mb-3">
        <label for="szerzo_szul_hely" class="form-label">Szuletesi hely</label>
        <input type="text" class="form-control" id="szerzo_szul_hely">
      </div>
      <div class="mb-3">
        <label for="szerzo_hal_ido" class="form-label">Halalozasi ev</label>
        <input type="number" class="form-control" id="szerzo_hal_ido" min="1000" max="3000">
      </div>
      <div class="mb-3">
        <label for="szerzo_hal_hely" class="form-label">Halalozasi hely</label>
        <input type="text" class="form-control" id="szerzo_hal_hely">
      </div>
      <button type="submit" class="btn btn-primary">Uj szerzo felvetele</button>
    </form>
  </div>
</body>
</html>
