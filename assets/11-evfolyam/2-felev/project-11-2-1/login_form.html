<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Bejelentkezes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="data.inline.js"></script>
  <script src="static-app.js" defer></script>
</head>
<body data-page="login">
  <div id="navbar-root"></div>
  <div class="container-fluid p-5 bg-primary text-white text-center">
    <h1>Bejelentkezes</h1>
    <p>Jelentkezzen be a rendszerbe</p>
  </div>

  <div class="container mt-5" id="app-error">
    <h2>Bejelentkezes</h2>
    <div id="errorBox"></div>
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="felhasznalo_nev" class="form-label">Felhasznalonev</label>
        <input type="text" class="form-control" id="felhasznalo_nev" name="felhasznalo_nev">
      </div>
      <div class="mb-3">
        <label for="felhasznalo_jelszo" class="form-label">Jelszo</label>
        <input type="password" class="form-control" id="felhasznalo_jelszo" name="felhasznalo_jelszo">
      </div>
      <button type="submit" class="btn btn-primary">Bejelentkezes</button>
    </form>
  </div>
</body>
</html>
