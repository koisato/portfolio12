<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Szerzok listaja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="data.inline.js"></script>
  <script src="static-app.js" defer></script>
</head>
<body data-page="authors">
  <div id="navbar-root"></div>
  <div class="container-fluid p-5 bg-primary text-white text-center">
    <h1>Szerzok listaja</h1>
    <p>Itt vannak szerzok.</p>
  </div>

  <div class="container mt-5" id="app-error">
    <form class="d-flex mx-auto w-50 mb-4" id="searchForm">
      <input class="form-control me-2" id="search" type="search" placeholder="Kereses szerzok kozott...">
      <button class="btn btn-outline-primary" type="submit">Kereses</button>
    </form>

    <table class="table table-striped table-hover">
      <thead class="table-light">
        <tr>
          <th>Nev</th>
          <th>Szuletesi ev</th>
          <th>Szuletesi hely</th>
          <th>Halalozasi ev</th>
          <th>Halalozasi hely</th>
        </tr>
      </thead>
      <tbody id="authorsBody"></tbody>
    </table>
  </div>
</body>
</html>
